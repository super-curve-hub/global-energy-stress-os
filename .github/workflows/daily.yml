name: Global Energy Stress OS

on:
  workflow_dispatch:

  schedule:
    # Every day 05:00 JST (20:00 UTC)
    - cron: "0 20 * * *"

jobs:

  dashboard:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Upgrade pip
        run: |
          python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      # -----------------------------
      # Code Quality
      # -----------------------------

      - name: Ruff
        run: |
          ruff check .

      - name: Black
        run: |
          black --check .

      - name: isort
        run: |
          isort --check-only .

      # -----------------------------
      # Unit Tests
      # -----------------------------

      - name: Run Tests
        run: |
          pytest -q

      # -----------------------------
      # Dashboard
      # -----------------------------

      - name: Run Global Energy Stress OS
        run: |
          python run.py

      # -----------------------------
      # Upload Outputs
      # -----------------------------

      - name: Upload dashboard artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dashboard
          path: |
            outputs/
            docs/
            logs/
            data/processed/
